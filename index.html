<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>表白</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      background:#ffeff5;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-family:"微软雅黑";
      overflow:hidden;
    }
    h1{
      font-size:40px;
      color:#ff5e97;
      margin-bottom:25px;
    }
    .btn{
      padding:6px 16px;
      font-size:15px;
      border:none;
      border-radius:18px;
      background:#ff5e97;
      color:#fff;
      cursor:pointer;
      margin:6px;
      transition:0.2s;
    }
    .btn:hover{
      transform:scale(1.1);
    }
    .flower, .heart{
      position:absolute;
      top:-50px;
      z-index:-1;
      animation:fall linear forwards;
    }
    @keyframes fall{
      to{transform:translateY(105vh);opacity:0;}
    }
  </style>
</head>
<body>
  <h1>我喜欢你，做我对象好不好？</h1>
  <div>
    <button class="btn" id="yes">好呀</button>
    <button class="btn" id="no">不要</button>
  </div>

  <script>
    // 清理飘落动画
    function clearFall() {
      document.querySelectorAll('.flower,.heart').forEach(item => item.remove());
    }

    // 点「好呀」跳转到成功页
    document.getElementById('yes').onclick = function(){
      clearFall();
      window.location.href = 'success.html'; // 跳转到第二个页面
    };

    // 点「不要」乱跑
    document.getElementById('no').onclick = function(){
      this.style.position='absolute';
      this.style.left=Math.random()*(window.innerWidth-100)+'px';
      this.style.top=Math.random()*(window.innerHeight-50)+'px';
    };

    // 初始飘落动画
    function createFlower(){
      let flower = document.createElement('div');
      flower.innerHTML = '🌸';
      flower.className = 'flower';
      flower.style.left = Math.random()*100+'vw';
      flower.style.fontSize=Math.random()*15+10+'px';
      flower.style.animationDuration=Math.random()*3+4+'s';
      document.body.appendChild(flower);
      setTimeout(()=>flower.remove(),7000);
    }
    setInterval(createFlower,300);

    function createHeart(){
      let heart = document.createElement('div');
      heart.innerHTML = '❤️';
      heart.className = 'heart';
      heart.style.left = Math.random()*100+'vw';
      heart.style.fontSize=Math.random()*18+12+'px';
      heart.style.animationDuration=Math.random()*3+4+'s';
      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(),6000);
    }
    setInterval(createHeart,200);
  </script>
</body>
</html>
